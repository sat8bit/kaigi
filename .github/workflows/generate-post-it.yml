name: Generate Post it

on:
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  hatena_hotentry_it:
    uses: ./.github/workflows/generate-post.yml
    with:
      rss-url: "https://b.hatena.ne.jp/hotentry/it.rss"
    secrets: inherit
